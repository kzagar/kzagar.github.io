<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background Circle (Clock-like) -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#41D1FF" stroke-width="2" />
  
  <!-- Clock Ticks -->
  <line x1="50" y1="2" x2="50" y2="8" stroke="#41D1FF" stroke-width="2" />
  <line x1="50" y1="92" x2="50" y2="98" stroke="#41D1FF" stroke-width="2" />
  <line x1="2" y1="50" x2="8" y2="50" stroke="#41D1FF" stroke-width="2" />
  <line x1="92" y1="50" x2="98" y2="50" stroke="#41D1FF" stroke-width="2" />

  <!-- Lungs / Breathing Symbol -->
  <g fill="#BD34FE" opacity="0.8">
    <!-- Left Lung -->
    <path d="M45,30 C30,30 20,40 20,60 C20,80 35,85 45,80 L45,30 Z" />
    <!-- Right Lung -->
    <path d="M55,30 C70,30 80,40 80,60 C80,80 65,85 55,80 L55,30 Z" />
  </g>

  <!-- Clock Hands (Time) -->
  <line x1="50" y1="50" x2="50" y2="35" stroke="#FFEA83" stroke-width="3" stroke-linecap="round" />
  <line x1="50" y1="50" x2="65" y2="50" stroke="#FFEA83" stroke-width="3" stroke-linecap="round" />
  <circle cx="50" cy="50" r="2" fill="#FFEA83" />
</svg>