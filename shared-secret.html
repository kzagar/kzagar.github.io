<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split Secret</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="shared-secret-page">
    <div class="container">
        <h1>Split Secret</h1>

        <div class="controls">
            <label for="secret">Secret to Split:</label>
            <input type="text" id="secret" placeholder="Enter secret (e.g., password123)">

            <label for="numShares">Total Number of Shares (N):</label>
            <input type="number" id="numShares" min="2" max="32" value="5">

            <label for="threshold">Required Shares for Reconstruction (M):</label>
            <input type="number" id="threshold" min="2" max="32" value="3">

            <button id="splitBtn">Split Secret!</button>
        </div>

        <div id="sharesOutput" class="hidden">
            <h2>Generated Shares</h2>
            <div id="sharesList"></div>
            <p class="info">Store these shares securely. You will need at least <span id="requiredCount"></span> shares to reconstruct the secret.</p>
        </div>
    </div>

    <script src="js/shamir.js"></script>
    <script src="js/shared-secret.js"></script>
</body>
</html>
